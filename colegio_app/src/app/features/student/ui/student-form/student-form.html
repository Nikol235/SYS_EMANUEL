<p-toast />

<div class="page-header">
  <h2>{{ $editId() ? 'Editar' : 'Nuevo' }} Alumno</h2>
</div>

<div class="card-container form-container">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-grid">
      <div class="field">
        <label>Nombres *</label>
        <input pInputText formControlName="firstName" class="w-full" placeholder="Nombres" />
      </div>
      <div class="field">
        <label>Apellidos *</label>
        <input pInputText formControlName="lastName" class="w-full" placeholder="Apellidos" />
      </div>
      <div class="field">
        <label>DNI <small style="color: var(--text-color-secondary)">(contraseña del padre/madre)</small></label>
        <input pInputText formControlName="dni" class="w-full" placeholder="DNI" maxlength="8" />
      </div>

      @if (!$editId() && previewParentUsername) {
        <div class="field" style="grid-column: 1 / -1">
          <label>Cuenta del padre/madre (generada automáticamente)</label>
          <div class="credentials-preview">
            <div class="credential-item">
              <span class="credential-label">Usuario:</span>
              <code>{{ previewParentUsername }}</code>
            </div>
            <div class="credential-item">
              <span class="credential-label">Contraseña:</span>
              <code>{{ form.value.dni || '(ingrese DNI)' }}</code>
              <small style="color: var(--text-color-secondary); margin-left: 0.5rem;">= DNI del alumno</small>
            </div>
          </div>
        </div>
      }
      <div class="field">
        <label>Fecha de Nacimiento</label>
        <p-datepicker formControlName="birthDate" [showIcon]="true" dateFormat="dd/mm/yy" styleClass="w-full" />
      </div>
      <div class="field">
        <label>Grado / Sección *</label>
        <p-select
          formControlName="gradeLevelId"
          [options]="$gradeLevels()"
          optionLabel="name"
          optionValue="id"
          placeholder="Seleccionar grado"
          styleClass="w-full"
        />
      </div>
      <div class="field">
        <label>Teléfono del padre/madre</label>
        <input pInputText formControlName="parentPhone" class="w-full" placeholder="999 999 999" />
      </div>
      @if (!$editId()) {
        <div class="field">
          <label>Mensualidad (S/.)</label>
          <input pInputText formControlName="monthlyFee" type="number" class="w-full" />
        </div>
      }
    </div>
    <div class="form-actions">
      <p-button type="button" label="Cancelar" severity="secondary" (onClick)="cancel()" />
      <p-button type="submit" label="Guardar" [loading]="$loading()" [disabled]="form.invalid" />
    </div>
  </form>
</div>
