<p-toast />
<p-confirmDialog />

<div class="page-header">
  <h2>Cursos</h2>
  @if (authState.$canManageUsers()) {
    <p-button label="Nuevo Curso" icon="pi pi-plus" (onClick)="openCreate()" />
  }
</div>

<div class="card-container">
  <p-table [value]="$courses()" [loading]="$loading()" styleClass="p-datatable-striped">
    <ng-template #header>
      <tr>
        <th>Color</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template #body let-c>
      <tr>
        <td><span class="color-dot" [style.background]="c.color"></span></td>
        <td>{{ c.name }}</td>
        <td>{{ c.description || '—' }}</td>
        <td>
          <div class="action-buttons">
            @if (authState.$canManageUsers()) {
              <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="info" (onClick)="openEdit(c)" />
              <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="confirmDelete(c)" />
            }
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr><td colspan="4" class="text-center p-4">No hay cursos registrados.</td></tr>
    </ng-template>
  </p-table>
</div>

<p-dialog header="{{ $editId() ? 'Editar Curso' : 'Nuevo Curso' }}" [(visible)]="dialogVisible" [modal]="true" [style]="{width: '450px'}">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field">
      <label>Nombre *</label>
      <input pInputText formControlName="name" class="w-full" />
    </div>
    <div class="field">
      <label>Descripción</label>
      <input pInputText formControlName="description" class="w-full" />
    </div>
    <div class="field">
      <label>Color</label>
      <div class="color-grid">
        @for (c of colorOptions; track c) {
          <span class="color-swatch" [style.background]="c" [class.selected]="form.value.color === c" (click)="form.patchValue({color: c})"></span>
        }
      </div>
    </div>
    <div class="dialog-actions">
      <p-button type="button" label="Cancelar" severity="secondary" (onClick)="dialogVisible = false" />
      <p-button type="submit" label="Guardar" [disabled]="form.invalid" />
    </div>
  </form>
</p-dialog>
