<p-toast />
<p-confirmDialog />

<div class="page-header">
  <h2>Usuarios</h2>
  @if (authState.$canManageUsers()) {
    <p-button label="Nuevo Usuario" icon="pi pi-plus" (onClick)="create()" />
  }
</div>

<div class="card-container">
  <p-table [value]="$users()" [loading]="$loading()" styleClass="p-datatable-striped" [paginator]="true" [rows]="20">
    <ng-template #header>
      <tr>
        <th>Usuario</th>
        <th>Nombre Completo</th>
        <th>Rol</th>
        <th>DNI</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template #body let-u>
      <tr>
        <td>{{ u.username }}</td>
        <td>{{ u.fullName }}</td>
        <td><p-tag [value]="u.role" [severity]="getRoleSeverity(u.role)" /></td>
        <td>{{ u.dni || '—' }}</td>
        <td><p-tag [value]="u.active ? 'Activo' : 'Inactivo'" [severity]="u.active ? 'success' : 'danger'" /></td>
        <td>
          <div class="action-buttons">
            @if (authState.$canManageUsers()) {
              <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" severity="info" (onClick)="edit(u)" />
              @if (authState.$isAdmin()) {
                <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="confirmDelete(u)" />
              }
            }
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr><td colspan="6" class="text-center p-4">No hay usuarios.</td></tr>
    </ng-template>
  </p-table>
</div>
