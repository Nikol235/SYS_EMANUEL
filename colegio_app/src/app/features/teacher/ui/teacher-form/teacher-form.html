<p-toast />

<div class="page-header">
  <h2>{{ $editId() ? 'Editar' : 'Registrar' }} Docente</h2>
</div>

<div class="card-container form-container">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-grid">

      <div class="field">
        <label>Nombres *</label>
        <input pInputText formControlName="firstName" class="w-full" placeholder="Ej: Juan Carlos" />
      </div>

      <div class="field">
        <label>Apellidos *</label>
        <input pInputText formControlName="lastName" class="w-full" placeholder="Ej: García López" />
      </div>

      @if (previewUsername) {
        <div class="field" style="grid-column: 1 / -1">
          <label>Credenciales generadas</label>
          <div class="credentials-preview">
            <div class="credential-item">
              <span class="credential-label">Usuario:</span>
              <code>{{ previewUsername }}</code>
            </div>
            <div class="credential-item">
              <span class="credential-label">Contraseña:</span>
              <code>{{ form.value.dni || '(ingrese DNI)' }}</code>
              <small style="color: var(--text-color-secondary); margin-left: 0.5rem;">= DNI del docente</small>
            </div>
          </div>
        </div>
      }

      <div class="field">
        <label>DNI * <small style="color: var(--text-color-secondary)">(será la contraseña inicial)</small></label>
        <input pInputText formControlName="dni" class="w-full" maxlength="8" placeholder="12345678" />
      </div>

      <div class="field">
        <label>Email</label>
        <input pInputText formControlName="email" class="w-full" type="email" />
      </div>

      <div class="field">
        <label>Teléfono</label>
        <input pInputText formControlName="phone" class="w-full" />
      </div>

    </div>

    <div class="form-actions">
      <p-button type="button" label="Cancelar" severity="secondary" (onClick)="cancel()" />
      <p-button type="submit" label="{{ $editId() ? 'Actualizar' : 'Registrar' }}" [loading]="$loading()" [disabled]="form.invalid" />
    </div>
  </form>
</div>
