services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: colegio_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer
    ports:
      - "8090:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
